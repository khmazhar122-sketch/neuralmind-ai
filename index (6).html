<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralMind AI - Pakistan's AI Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0a12;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#7c3aed44;border-radius:2px}
textarea,input,select{color-scheme:dark}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect} = React;
const DAILY_FREE_LIMIT = 10;
function getTodayKey(){return "nm_"+new Date().toISOString().slice(0,10)}
function getUsage(){return parseInt(localStorage.getItem(getTodayKey())||"0")}
function incUsage(){localStorage.setItem(getTodayKey(),getUsage()+1)}

const GEMINI_KEY = "AIzaSyAVALnHCz-0OBa4rsErSrWErQYQgI4Egfc";
async function callClaude(messages,system=""){
  const sysPrompt = system||"You are NeuralMind AI, a helpful assistant for Pakistani users. Support both Urdu and English. Be friendly and concise.";
  try{
    const contents = [];
    contents.push({role:"user",parts:[{text:"[System]: "+sysPrompt+"

Acknowledge."}]});
    contents.push({role:"model",parts:[{text:"Understood."}]});
    messages.forEach(m=>contents.push({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}));
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_KEY}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents,generationConfig:{maxOutputTokens:800,temperature:0.7}})
    });
    const data = await res.json();
    if(data.error) return "API Error: "+data.error.message;
    return data.candidates?.[0]?.content?.parts?.[0]?.text||"Jawab nahi mila.";
  }catch(e){return "Connection error: "+e.message;}
}

function PaywallModal({onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(8px)"}}>
      <div style={{background:"linear-gradient(145deg,#1a0a2e,#0f0f1a)",border:"1px solid #7c3aed",borderRadius:24,padding:"40px 36px",maxWidth:380,width:"90%",textAlign:"center",boxShadow:"0 0 60px rgba(124,58,237,0.3)"}}>
        <div style={{fontSize:48,marginBottom:12}}>👑</div>
        <h2 style={{color:"#fff",fontSize:22,fontWeight:700,marginBottom:8}}>Free Limit Reached!</h2>
        <p style={{color:"#a78bfa",fontSize:14,marginBottom:24,lineHeight:1.6}}>Aap ne aaj ke 10 free messages use kar liye.<br/>Premium upgrade karo unlimited access ke liye!</p>
        <div style={{background:"rgba(124,58,237,0.15)",border:"1px solid rgba(124,58,237,0.3)",borderRadius:16,padding:"20px",marginBottom:24}}>
          <div style={{color:"#7c3aed",fontSize:12,fontWeight:600,letterSpacing:2,marginBottom:8}}>PREMIUM PLAN</div>
          <div style={{color:"#fff",fontSize:32,fontWeight:800}}>Rs. 299<span style={{fontSize:14,color:"#a78bfa",fontWeight:400}}>/month</span></div>
          <div style={{color:"#a78bfa",fontSize:12,marginTop:8}}>Unlimited messages • All features • Priority AI</div>
        </div>
        <button style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:12}}>🚀 Upgrade to Premium</button>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:13}}>Kal wapas aao (free limit reset hogi)</button>
      </div>
    </div>
  );
}

function ChatFeature({onLimitHit,checkLimit}){
  const [messages,setMessages]=useState([{role:"assistant",content:"Assalam-o-Alaikum! 👋 Main NeuralMind AI hoon. Aap se kaise madad kar sakta hoon?\n(Urdu ya English mein likho)"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef();
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[messages]);

  async function send(){
    if(!input.trim()||loading)return;
    if(!checkLimit()){onLimitHit();return;}
    const userMsg={role:"user",content:input.trim()};
    setMessages(m=>[...m,userMsg]);
    setInput("");setLoading(true);incUsage();
    try{
      const reply=await callClaude([...messages,userMsg]);
      setMessages(m=>[...m,{role:"assistant",content:reply}]);
    }catch(e){setMessages(m=>[...m,{role:"assistant",content:"Error aaya. Dobara try karo."}]);}
    setLoading(false);
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8,alignItems:"flex-end"}}>
            {m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>🧠</div>}
            <div style={{maxWidth:"75%",padding:"10px 14px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:m.role==="user"?"linear-gradient(135deg,#7c3aed,#4f46e5)":"rgba(255,255,255,0.06)",border:m.role==="user"?"none":"1px solid rgba(255,255,255,0.08)",color:"#f0f0f0",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{m.content}</div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🧠</div>
          <div style={{padding:"10px 16px",background:"rgba(255,255,255,0.06)",borderRadius:"18px 18px 18px 4px",border:"1px solid rgba(255,255,255,0.08)"}}>
            <div style={{display:"flex",gap:4}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#7c3aed",animation:`bounce 1s ${i*0.2}s infinite`}}/>)}
            </div>
          </div>
        </div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Kuch bhi poochho... (Urdu/English)" style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:24,padding:"10px 16px",color:"#f0f0f0",fontSize:14,outline:"none",fontFamily:"inherit"}}/>
        <button onClick={send} disabled={!input.trim()||loading} style={{width:42,height:42,borderRadius:"50%",background:input.trim()?"linear-gradient(135deg,#7c3aed,#4f46e5)":"rgba(255,255,255,0.06)",border:"none",cursor:input.trim()?"pointer":"default",color:"#fff",fontSize:18,transition:"all 0.2s"}}>➤</button>
      </div>
    </div>
  );
}

function TranslateFeature({onLimitHit,checkLimit}){
  const [input,setInput]=useState("");
  const [output,setOutput]=useState("");
  const [loading,setLoading]=useState(false);
  const [fromLang,setFromLang]=useState("English");
  const [toLang,setToLang]=useState("Urdu");
  const langs=["English","Urdu","Roman Urdu","Hindi","Arabic","French","Spanish","Chinese"];

  async function translate(){
    if(!input.trim()||loading)return;
    if(!checkLimit()){onLimitHit();return;}
    setLoading(true);incUsage();
    const reply=await callClaude([{role:"user",content:`Translate from ${fromLang} to ${toLang}:\n\n${input}\n\nOnly provide the translation.`}],"You are a professional translator.");
    setOutput(reply);setLoading(false);
  }

  return(
    <div style={{padding:20,display:"flex",flexDirection:"column",gap:16,height:"100%",overflowY:"auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{flex:1}}>
          <label style={{color:"#a78bfa",fontSize:11,fontWeight:600,letterSpacing:1}}>FROM</label>
          <select value={fromLang} onChange={e=>setFromLang(e.target.value)} style={{width:"100%",marginTop:6,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"9px 12px",color:"#f0f0f0",fontSize:14,outline:"none",fontFamily:"inherit"}}>
            {langs.map(l=><option key={l} value={l} style={{background:"#1a1a2e"}}>{l}</option>)}
          </select>
        </div>
        <button onClick={()=>{setFromLang(toLang);setToLang(fromLang);setInput(output);setOutput(input);}} style={{marginTop:20,width:38,height:38,borderRadius:"50%",background:"rgba(124,58,237,0.2)",border:"1px solid rgba(124,58,237,0.4)",color:"#a78bfa",cursor:"pointer",fontSize:18}}>⇄</button>
        <div style={{flex:1}}>
          <label style={{color:"#a78bfa",fontSize:11,fontWeight:600,letterSpacing:1}}>TO</label>
          <select value={toLang} onChange={e=>setToLang(e.target.value)} style={{width:"100%",marginTop:6,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"9px 12px",color:"#f0f0f0",fontSize:14,outline:"none",fontFamily:"inherit"}}>
            {langs.map(l=><option key={l} value={l} style={{background:"#1a1a2e"}}>{l}</option>)}
          </select>
        </div>
      </div>
      <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder={`${fromLang} mein likho...`} rows={4} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"12px 14px",color:"#f0f0f0",fontSize:14,outline:"none",fontFamily:"inherit",resize:"vertical",lineHeight:1.6}}/>
      <button onClick={translate} disabled={!input.trim()||loading} style={{padding:"13px",background:input.trim()?"linear-gradient(135deg,#7c3aed,#4f46e5)":"rgba(255,255,255,0.06)",border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:input.trim()?"pointer":"default",fontFamily:"inherit"}}>
        {loading?"Translating...":"🌐 Translate"}
      </button>
      {output&&<div style={{background:"rgba(124,58,237,0.1)",border:"1px solid rgba(124,58,237,0.3)",borderRadius:12,padding:16}}>
        <div style={{color:"#a78bfa",fontSize:11,fontWeight:600,letterSpacing:1,marginBottom:10}}>TRANSLATION</div>
        <p style={{color:"#f0f0f0",fontSize:15,lineHeight:1.8,direction:toLang==="Urdu"||toLang==="Arabic"?"rtl":"ltr"}}>{output}</p>
        <button onClick={()=>navigator.clipboard.writeText(output)} style={{marginTop:10,background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 12px",color:"#888",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>📋 Copy</button>
      </div>}
    </div>
  );
}

function ImageFeature({onLimitHit,checkLimit}){
  const [prompt,setPrompt]=useState("");
  const [result,setResult]=useState("");
  const [loading,setLoading]=useState(false);
  const [style,setStyle]=useState("realistic");
  const styles=["realistic","cartoon","anime","oil painting","watercolor","cyberpunk"];

  async function generate(){
    if(!prompt.trim()||loading)return;
    if(!checkLimit()){onLimitHit();return;}
    setLoading(true);incUsage();
    const reply=await callClaude([{role:"user",content:`Generate a vivid image description for: "${prompt}" in ${style} style. Include colors, lighting, mood. Under 120 words.`}],"You are an AI art director.");
    setResult(reply);setLoading(false);
  }

  return(
    <div style={{padding:20,display:"flex",flexDirection:"column",gap:16,height:"100%",overflowY:"auto"}}>
      <div>
        <label style={{color:"#a78bfa",fontSize:12,fontWeight:600,letterSpacing:1}}>STYLE</label>
        <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
          {styles.map(s=><button key={s} onClick={()=>setStyle(s)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${style===s?"#7c3aed":"rgba(255,255,255,0.1)"}`,background:style===s?"rgba(124,58,237,0.3)":"rgba(255,255,255,0.04)",color:style===s?"#a78bfa":"#888",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{s}</button>)}
        </div>
      </div>
      <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder="Describe karo... jaise 'Lahore ki galiyan raat ko'" rows={3} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"12px 14px",color:"#f0f0f0",fontSize:14,outline:"none",fontFamily:"inherit",resize:"vertical"}}/>
      <button onClick={generate} disabled={!prompt.trim()||loading} style={{padding:"13px",background:prompt.trim()?"linear-gradient(135deg,#7c3aed,#4f46e5)":"rgba(255,255,255,0.06)",border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:prompt.trim()?"pointer":"default",fontFamily:"inherit"}}>
        {loading?"⟳ Generating...":"🎨 Generate"}
      </button>
      {result&&<div style={{background:"rgba(124,58,237,0.1)",border:"1px solid rgba(124,58,237,0.3)",borderRadius:16,padding:20}}>
        <div style={{width:"100%",aspectRatio:"16/9",borderRadius:12,background:"linear-gradient(135deg,#1a0a2e,#0f1a2e)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:14,border:"1px solid rgba(124,58,237,0.2)"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:48}}>🎨</div><div style={{color:"#a78bfa",fontSize:12,marginTop:8}}>AI Art Concept</div></div>
        </div>
        <p style={{color:"#d4d4d8",fontSize:14,lineHeight:1.7}}>{result}</p>
      </div>}
    </div>
  );
}

function VoiceFeature({onLimitHit,checkLimit}){
  const [recording,setRecording]=useState(false);
  const [transcript,setTranscript]=useState("");
  const [aiReply,setAiReply]=useState("");
  const [loading,setLoading]=useState(false);
  const supported='webkitSpeechRecognition' in window||'SpeechRecognition' in window;
  const recRef=useRef(null);

  function startRecording(){
    if(!supported)return;
    if(!checkLimit()){onLimitHit();return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();
    rec.lang="ur-PK";rec.interimResults=false;
    rec.onresult=async(e)=>{
      const text=e.results[0][0].transcript;
      setTranscript(text);setRecording(false);setLoading(true);incUsage();
      const reply=await callClaude([{role:"user",content:text}]);
      setAiReply(reply);setLoading(false);
    };
    rec.onerror=()=>setRecording(false);
    rec.onend=()=>setRecording(false);
    rec.start();recRef.current=rec;setRecording(true);
  }

  return(
    <div style={{padding:20,display:"flex",flexDirection:"column",alignItems:"center",gap:24,height:"100%",overflowY:"auto"}}>
      <div style={{textAlign:"center",paddingTop:20}}>
        <h3 style={{color:"#fff",fontSize:18,fontWeight:600,marginBottom:8}}>Voice to Text AI</h3>
        <p style={{color:"#888",fontSize:13}}>Urdu ya English mein bolo — AI jawab dega</p>
      </div>
      <div style={{position:"relative"}}>
        {recording&&<><div style={{position:"absolute",inset:-20,borderRadius:"50%",border:"2px solid rgba(124,58,237,0.4)",animation:"ripple 1.5s ease-out infinite"}}/><div style={{position:"absolute",inset:-10,borderRadius:"50%",border:"2px solid rgba(124,58,237,0.6)",animation:"ripple 1.5s 0.5s ease-out infinite"}}/></>}
        <button onClick={recording?()=>{recRef.current?.stop();setRecording(false);}:startRecording} style={{width:100,height:100,borderRadius:"50%",background:recording?"linear-gradient(135deg,#ef4444,#dc2626)":"linear-gradient(135deg,#7c3aed,#4f46e5)",border:"none",cursor:"pointer",fontSize:36,boxShadow:recording?"0 0 30px rgba(239,68,68,0.5)":"0 0 30px rgba(124,58,237,0.4)",transition:"all 0.3s"}}>
          {recording?"⏹":"🎤"}
        </button>
      </div>
      <p style={{color:recording?"#ef4444":"#888",fontSize:13,fontWeight:recording?600:400}}>{recording?"🔴 Recording...":supported?"Mic dabao aur bolo":"❌ Voice support nahi"}</p>
      {transcript&&<div style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:16}}><div style={{color:"#a78bfa",fontSize:11,fontWeight:600,letterSpacing:1,marginBottom:8}}>TUMNE KAHA:</div><p style={{color:"#f0f0f0",fontSize:15}}>{transcript}</p></div>}
      {loading&&<div style={{color:"#a78bfa",fontSize:14}}>🧠 AI soch raha hai...</div>}
      {aiReply&&<div style={{width:"100%",background:"rgba(124,58,237,0.1)",border:"1px solid rgba(124,58,237,0.3)",borderRadius:12,padding:16}}>
        <div style={{color:"#a78bfa",fontSize:11,fontWeight:600,letterSpacing:1,marginBottom:8}}>AI KA JAWAB:</div>
        <p style={{color:"#f0f0f0",fontSize:15,lineHeight:1.7}}>{aiReply}</p>
        <button onClick={()=>{const u=new SpeechSynthesisUtterance(aiReply);u.lang="ur-PK";window.speechSynthesis.speak(u);}} style={{marginTop:12,background:"rgba(124,58,237,0.2)",border:"1px solid rgba(124,58,237,0.4)",borderRadius:8,padding:"8px 16px",color:"#a78bfa",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>🔊 Sunaao</button>
      </div>}
    </div>
  );
}

function App(){
  const [activeTab,setActiveTab]=useState("chat");
  const [showPaywall,setShowPaywall]=useState(false);
  const [usage,setUsage]=useState(getUsage());
  const isPremium=false;

  function checkLimit(){
    if(isPremium)return true;
    const u=getUsage();setUsage(u);
    return u<DAILY_FREE_LIMIT;
  }

  const tabs=[{id:"chat",label:"AI Chat",icon:"💬"},{id:"image",label:"Images",icon:"🎨"},{id:"translate",label:"Translate",icon:"🌐"},{id:"voice",label:"Voice",icon:"🎤"}];
  const remaining=Math.max(0,DAILY_FREE_LIMIT-usage);

  return(
    <div style={{minHeight:"100vh",background:"#0a0a12",display:"flex",flexDirection:"column",fontFamily:"'Outfit',sans-serif"}}>
      {showPaywall&&<PaywallModal onClose={()=>setShowPaywall(false)}/>}
      <div style={{background:"rgba(10,10,18,0.95)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(124,58,237,0.2)",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🧠</div>
          <div>
            <div style={{color:"#fff",fontWeight:700,fontSize:16}}>NeuralMind AI</div>
            <div style={{color:"#7c3aed",fontSize:10,fontWeight:600,letterSpacing:2}}>PAKISTAN'S AI ASSISTANT</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {!isPremium&&<div style={{background:"rgba(124,58,237,0.15)",border:"1px solid rgba(124,58,237,0.3)",borderRadius:20,padding:"4px 12px",fontSize:12,color:remaining<=3?"#ef4444":"#a78bfa"}}>{remaining} msgs left</div>}
          <button onClick={()=>setShowPaywall(true)} style={{background:"linear-gradient(135deg,#7c3aed,#4f46e5)",border:"none",borderRadius:20,padding:"6px 14px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>👑 Premium</button>
        </div>
      </div>
      <div style={{background:"rgba(10,10,18,0.8)",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",padding:"0 16px"}}>
        {tabs.map(tab=>(
          <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{flex:1,padding:"12px 8px",background:"none",border:"none",borderBottom:activeTab===tab.id?"2px solid #7c3aed":"2px solid transparent",color:activeTab===tab.id?"#a78bfa":"#555",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.2s"}}>
            <span style={{fontSize:18}}>{tab.icon}</span>{tab.label}
          </button>
        ))}
      </div>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",animation:"fadeIn 0.3s ease"}}>
        {activeTab==="chat"&&<ChatFeature onLimitHit={()=>setShowPaywall(true)} checkLimit={checkLimit}/>}
        {activeTab==="image"&&<ImageFeature onLimitHit={()=>setShowPaywall(true)} checkLimit={checkLimit}/>}
        {activeTab==="translate"&&<TranslateFeature onLimitHit={()=>setShowPaywall(true)} checkLimit={checkLimit}/>}
        {activeTab==="voice"&&<VoiceFeature onLimitHit={()=>setShowPaywall(true)} checkLimit={checkLimit}/>}
      </div>
      <div style={{background:"rgba(10,10,18,0.95)",borderTop:"1px solid rgba(255,255,255,0.04)",padding:"8px 16px",display:"flex",justifyContent:"space-between"}}>
        <span style={{color:"#333",fontSize:11}}>NeuralMind AI v1.0 • Pakistan</span>
        <span style={{color:"#333",fontSize:11}}>Powered by Claude AI</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
